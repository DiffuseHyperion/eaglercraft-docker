version: '3'
services:
  website:
    image: 'diffusehyperion/eaglercraft-website:latest-secure'
    restart: unless-stopped
    stdin_open: true
    tty: true
    networks:
      - nginx_default
  bungeecord:
    image: 'diffusehyperion/eaglercraft-bungee:latest-secure'
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
      - bungeecord-data:/data
    networks:
      - nginx_default
      - bungeecord-network
    environment:
      - ONLINE=false
  lobby:
    image: 'diffusehyperion/eaglercraft-bukkit:latest-secure'
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - 25566:25565
    volumes:
      - lobby-data:/data
    networks:
      - bungeecord-network
    environment:
      - ONLINE=false
  survival:
    image: 'diffusehyperion/eaglercraft-bukkit:latest-secure'
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - 25567:25565
    volumes:
      - survival-data:/data
    networks:
      - bungeecord-network
    environment:
      - ONLINE=false
networks:
  nginx_default:
    external: true
  bungeecord-network:
    external: false
volumes:
  bungeecord-data:
  lobby-data:
  survival-data:
