version: '3'
services:
  website:
    image: 'diffusehyperion/eaglercraft-website:latest'
    restart: unless-stopped
    stdin_open: true
    tty: true
    networks:
      - nginx_default
  bungeecord:
    image: 'diffusehyperion/eaglercraft-bungee:latest'
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
      - emcbungeecorddata:/data
    networks:
      - nginx_default
      - eaglercraft
  lobby:
    image: 'diffusehyperion/eaglercraft-bukkit:latest'
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - 25566:25565
    volumes:
      - emclobbydata:/data
    networks:
      - eaglercraft
  survival:
    image: 'diffusehyperion/eaglercraft-bukkit:latest'
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - 25567:25565
    volumes:
      - emcsurvivaldata:/data
    networks:
      - eaglercraft
networks:
  nginx_default:
    external: true
  eaglercraft:
    external: false
volumes:
  emcbungeecorddata:
  emclobbydata:
  emcsurvivaldata:
